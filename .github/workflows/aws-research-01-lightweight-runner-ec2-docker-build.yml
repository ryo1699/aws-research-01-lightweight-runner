name: Build Docker Image on EC2 Runner

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - app/**
      - infra/terraform/**
      - .github/workflows/aws-research-01-lightweight-runner-ec2-docker-build.yml

concurrency:
  group: aws-research-01-lightweight-runner
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  PROJECT_NAME: aws-research-01-lightweight-runner
  RUNNER_TAG_TASK: aws-research-01-lightweight-runner
  AWS_REGION: ${{ vars.AWS_RESEARCH_01_LIGHTWEIGHT_RUNNER_AWS_REGION || 'ap-northeast-1' }}
  ECR_REPOSITORY: ${{ vars.AWS_RESEARCH_01_LIGHTWEIGHT_RUNNER_ECR_REPOSITORY || 'aws-research-01-lightweight-runner-docker-build' }}
  ROLE_TO_ASSUME: ${{ secrets.AWS_RESEARCH_01_LIGHTWEIGHT_RUNNER_AWS_ROLE_TO_ASSUME }}
  GH_RUNNER_TOKEN: ${{ secrets.AWS_RESEARCH_01_LIGHTWEIGHT_RUNNER_GH_RUNNER_TOKEN }}

jobs:
  start-ec2-runner:
    name: Start EC2 runner
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      instance-id: ${{ steps.find-runner.outputs.instance_id }}
      runner-name: ${{ steps.runner-meta.outputs.runner_name }}
      runner-label: ${{ steps.runner-meta.outputs.runner_label }}
      image-uri: ${{ steps.ecr.outputs.image_uri }}
    steps:
      - name: Check required settings
        shell: bash
        run: |
          set -euo pipefail

          test -n "${ROLE_TO_ASSUME}" || { echo "::error::ROLE_TO_ASSUME is missing"; exit 64; }
          test -n "${GH_RUNNER_TOKEN}" || { echo "::error::GH_RUNNER_TOKEN is missing"; exit 64; }
          test -n "${AWS_REGION}" || { echo "::error::AWS_REGION is missing"; exit 64; }
          test -n "${ECR_REPOSITORY}" || { echo "::error::ECR_REPOSITORY is missing"; exit 64; }

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}

      - name: Set runner metadata
        id: runner-meta
        shell: bash
        run: |
          set -euo pipefail

          runner_name="${PROJECT_NAME}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          runner_label="${PROJECT_NAME}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "runner_name=${runner_name}" >> "${GITHUB_OUTPUT}"
          echo "runner_label=${runner_label}" >> "${GITHUB_OUTPUT}"

      - name: Find EC2 runner instance
        id: find-runner
        shell: bash
        run: |
          set -euo pipefail

          instance_ids="$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=${PROJECT_NAME}" \
              "Name=tag:Task,Values=${RUNNER_TAG_TASK}" \
              "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)"

          instance_count="$(wc -w <<< "${instance_ids}" | tr -d ' ')"

          if [[ "${instance_count}" != "1" ]]; then
            echo "::error::Expected exactly one EC2 runner instance for Project=${PROJECT_NAME}, Task=${RUNNER_TAG_TASK}; found ${instance_count}: ${instance_ids}"
            exit 65
          fi

          echo "instance_id=${instance_ids}" >> "${GITHUB_OUTPUT}"

      - name: Start EC2 instance and wait for SSM
        id: start-ec2
        shell: bash
        env:
          INSTANCE_ID: ${{ steps.find-runner.outputs.instance_id }}
        run: |
          set -euo pipefail

          state="$(aws ec2 describe-instances \
            --instance-ids "${INSTANCE_ID}" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text)"

          echo "Current instance state: ${state}"

          case "${state}" in
            stopped)
              aws ec2 start-instances --instance-ids "${INSTANCE_ID}" >/dev/null
              ;;
            running|pending)
              ;;
            stopping)
              aws ec2 wait instance-stopped --instance-ids "${INSTANCE_ID}"
              aws ec2 start-instances --instance-ids "${INSTANCE_ID}" >/dev/null
              ;;
            terminated|shutting-down)
              echo "::error::Runner instance is ${state}. Run terraform apply and retry."
              exit 66
              ;;
            *)
              echo "::error::Unexpected instance state: ${state}"
              exit 66
              ;;
          esac

          aws ec2 wait instance-running --instance-ids "${INSTANCE_ID}"

          ssm_ready="false"
          for _ in {1..90}; do
            online_instance="$(aws ssm describe-instance-information \
              --query "InstanceInformationList[?InstanceId=='${INSTANCE_ID}' && PingStatus=='Online'].InstanceId | [0]" \
              --output text 2>/dev/null || true)"

            if [[ "${online_instance}" == "${INSTANCE_ID}" ]]; then
              ssm_ready="true"
              break
            fi

            sleep 5
          done

          if [[ "${ssm_ready}" != "true" ]]; then
            echo "::error::SSM did not become online for ${INSTANCE_ID}"
            exit 67
          fi

      - name: Register ephemeral GitHub runner
        id: register-runner
        shell: bash
        env:
          INSTANCE_ID: ${{ steps.find-runner.outputs.instance_id }}
          RUNNER_NAME: ${{ steps.runner-meta.outputs.runner_name }}
          RUNNER_LABEL: ${{ steps.runner-meta.outputs.runner_label }}
        run: |
          set -euo pipefail

          repo_url="https://github.com/${GITHUB_REPOSITORY}"
          response="$(curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_RUNNER_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runners/registration-token")"

          registration_token="$(jq -r '.token // empty' <<< "${response}")"
          expires_at="$(jq -r '.expires_at // empty' <<< "${response}")"

          if [[ -z "${registration_token}" ]]; then
            echo "::error::GitHub runner registration token was not returned"
            exit 68
          fi

          echo "::add-mask::${registration_token}"
          echo "Created registration token that expires at ${expires_at}"

          command_script="$(cat <<SCRIPT
          set -euo pipefail

          for _ in \$(seq 1 120); do
            if [ -x /usr/local/bin/start-github-runner ]; then
              sudo /usr/local/bin/start-github-runner '${repo_url}' '${registration_token}' '${RUNNER_NAME}' '${RUNNER_LABEL}'
              exit 0
            fi
            sleep 5
          done

          echo 'start-github-runner did not become available before timeout' >&2
          tail -n 200 /var/log/cloud-init-output.log || true
          exit 70
          SCRIPT
          )"

          command_json="$(jq -n --arg cmd "${command_script}" '{commands: [$cmd]}')"

          command_id="$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --instance-ids "${INSTANCE_ID}" \
            --parameters "${command_json}" \
            --comment "Register ephemeral GitHub Actions runner ${RUNNER_NAME}" \
            --query 'Command.CommandId' \
            --output text)"

          for _ in {1..60}; do
            status="$(aws ssm get-command-invocation \
              --command-id "${command_id}" \
              --instance-id "${INSTANCE_ID}" \
              --query Status \
              --output text 2>/dev/null || true)"

            case "${status}" in
              Success)
                echo "command_id=${command_id}" >> "${GITHUB_OUTPUT}"
                exit 0
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                aws ssm get-command-invocation \
                  --command-id "${command_id}" \
                  --instance-id "${INSTANCE_ID}" \
                  --output json || true
                exit 69
                ;;
            esac

            sleep 5
          done

          echo "::error::SSM runner registration command did not finish in time"
          aws ssm get-command-invocation \
            --command-id "${command_id}" \
            --instance-id "${INSTANCE_ID}" \
            --output json || true
          exit 69

      - name: Wait for runner online
        shell: bash
        env:
          RUNNER_NAME: ${{ steps.runner-meta.outputs.runner_name }}
        run: |
          set -euo pipefail

          for _ in {1..60}; do
            runner_status="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_RUNNER_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runners?per_page=100" \
              | jq -r --arg name "${RUNNER_NAME}" '.runners[]? | select(.name == $name) | .status' \
              | head -n 1)"

            if [[ "${runner_status}" == "online" ]]; then
              exit 0
            fi

            sleep 5
          done

          echo "::error::Runner ${RUNNER_NAME} did not become online in time"
          exit 70

      - name: Set image URI
        id: ecr
        shell: bash
        run: |
          set -euo pipefail

          account_id="$(aws sts get-caller-identity --query Account --output text)"
          image_uri="${account_id}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"
          echo "image_uri=${image_uri}" >> "${GITHUB_OUTPUT}"

  build-and-push:
    name: Build and push Docker image
    needs: start-ec2-runner
    runs-on:
      - self-hosted
      - ${{ needs.start-ec2-runner.outputs.runner-label }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        shell: bash
        env:
          IMAGE_URI: ${{ needs.start-ec2-runner.outputs.image-uri }}
        run: |
          set -euo pipefail

          docker build -t "${IMAGE_URI}:${GITHUB_SHA}" -t "${IMAGE_URI}:latest" app
          docker push "${IMAGE_URI}:${GITHUB_SHA}"
          docker push "${IMAGE_URI}:latest"

  stop-ec2-runner:
    name: Stop EC2 runner
    needs:
      - start-ec2-runner
      - build-and-push
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Configure AWS credentials
        if: ${{ env.ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}

      - name: Delete stale runner registration
        if: ${{ env.GH_RUNNER_TOKEN != '' && needs.start-ec2-runner.outputs.runner-name != '' }}
        shell: bash
        env:
          RUNNER_NAME: ${{ needs.start-ec2-runner.outputs.runner-name }}
        run: |
          set -euo pipefail

          runner_id="$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_RUNNER_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runners?per_page=100" \
            | jq -r --arg name "${RUNNER_NAME}" '.runners[]? | select(.name == $name) | .id' \
            | head -n 1)"

          if [[ -n "${runner_id}" && "${runner_id}" != "null" ]]; then
            curl -fsSL \
              -X DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_RUNNER_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runners/${runner_id}" >/dev/null
          fi

      - name: Find EC2 runner instance
        id: find-runner
        if: ${{ env.ROLE_TO_ASSUME != '' }}
        shell: bash
        env:
          START_JOB_INSTANCE_ID: ${{ needs.start-ec2-runner.outputs.instance-id }}
        run: |
          set -euo pipefail

          if [[ -n "${START_JOB_INSTANCE_ID}" ]]; then
            echo "instance_id=${START_JOB_INSTANCE_ID}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          instance_ids="$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=${PROJECT_NAME}" \
              "Name=tag:Task,Values=${RUNNER_TAG_TASK}" \
              "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)"

          instance_count="$(wc -w <<< "${instance_ids}" | tr -d ' ')"

          if [[ "${instance_count}" != "1" ]]; then
            echo "Expected exactly one EC2 runner instance; found ${instance_count}: ${instance_ids}"
            exit 0
          fi

          echo "instance_id=${instance_ids}" >> "${GITHUB_OUTPUT}"

      - name: Stop EC2 instance
        if: ${{ steps.find-runner.outputs.instance_id != '' }}
        shell: bash
        env:
          INSTANCE_ID: ${{ steps.find-runner.outputs.instance_id }}
        run: |
          set -euo pipefail

          state="$(aws ec2 describe-instances \
            --instance-ids "${INSTANCE_ID}" \
            --query 'Reservations[0].Instances[0].State.Name' \
            --output text)"

          echo "Current instance state: ${state}"

          case "${state}" in
            running|pending)
              aws ec2 stop-instances --instance-ids "${INSTANCE_ID}" >/dev/null
              aws ec2 wait instance-stopped --instance-ids "${INSTANCE_ID}"
              ;;
            stopped|stopping)
              ;;
            *)
              echo "No stop action for state: ${state}"
              ;;
          esac
